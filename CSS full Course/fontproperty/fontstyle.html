<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font-style</title>

    <style>
        #first{
            font-style : italic;
        }

        #second{
            font-style : oblique;
        }

        #third{
            font-style : normal;
        }
    </style>
</head>
<body>
    <p id="first">Lorem ipsum dolor sit amet consectetur adipisicing elit. Libero, dolorem!</p>

    <p id="second">Lorem ipsum dolor sit amet consectetur adipisicing elit. Itaque, voluptate.</p>

    <p id="third">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Iusto, numquam.</p>
</body>
</html>
