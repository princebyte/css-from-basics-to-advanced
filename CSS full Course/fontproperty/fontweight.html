<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font-weight</title>
    <style>
        #first{
            font-weight : 200;
        }

        #second{
            font-weight : 400;
        }

        #third{
            font-weight : 600;
        }

        #fourth{
            font-weight : 1000;
        }

    </style>
</head>
<body>
    <p id="first">Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempore, libero!</p>

    <p id="second">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Atque, quam?</p>

    <p id="third">Lorem ipsum dolor sit amet consectetur adipisicing elit. Ut, nobis!</p>

    <p id="fourth">Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatem, pariatur.</p>
    
</body>
</html>
