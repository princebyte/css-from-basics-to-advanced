<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>how to import image in css</title>
    <style>
        #icon {
            height : 200px;
            width : 200px;
            background-image: url(../images/myntra.png);
            /* image ka jitna size hai utna wo show  hone lagega*/
            background-size :contain;
            /* agr bar bar image repeat hoke aaye aur use hatana hai to is property ka use */
            background-repeat :no-repeat;
            /* ye image ke position ko idhar udhar karne ke liye use hota hai */
            background-position : bottom;
        }
    </style>
</head>
<body>
    <div id="icon"></div>
    
</body>
</html>
