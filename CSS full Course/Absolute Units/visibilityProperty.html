<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visibility propertyt</title>
    <style>
    .box{
        height : 80px;
        width : 80px;
    }
     #box1{
        background-color :aqua;
        visibility : hidden ;
     }

     #box2{
        background-color :bisque;
        visibility : visible  ;
     }
    </style>
</head>
<body>
    <div class="box"></div>
    <div id="box1" class="box">box1</div>
    <div id="box2" class="box">box2</div>
    
</body>
</html>
