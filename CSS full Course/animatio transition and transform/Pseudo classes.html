<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psuedo Classes</title>

    <style>
        .btn{
            
            height : 20px;
            width : 150px;
            background-color : rgb(21, 156, 53);
            border : 1px  solid black;
            border-radius : 5px;
            
        }

        .btn:hover{
            
            height : 23px;
            width : 152px;
            background-color : rgb(223, 48, 60);
            border : 1px solid red;
        }

        .btn:active{
            height : 23px;
            width : 152px;
            background-color : blueviolet;
        }
    </style>
</head>
<body>
    
        <button class="btn">Learning Pseudo</button>
    
</body>
</html>
