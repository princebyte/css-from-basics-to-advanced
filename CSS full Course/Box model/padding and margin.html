<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>padding and margin property</title>

    <style>
        *{
            padding : 0;
            margin : 0;
        }

        .pad{
            height : 100px;
            width : 100px;
            margin : 5px;
        }
        #first{
            background-color : green;
            padding : 2px;
            /* margin : 5px;             */
            border-radius : 5px
        }   

        #second{
            height : 100px;
            width : 100px;
            background-color : rgb(193, 31, 31);
            padding : 2px;
            margin : 30px 0px 0px 5px;
            border-radius : 5px;  
            
        }
    </style>
</head>
<body>
    <div id="first" class="pad">First</div>
    <div id="second" class="pad">Second</div>
    
</body>
</html>
