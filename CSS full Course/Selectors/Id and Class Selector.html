<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Practice</title>
</head>
<style>
    #top_heading{
        color : red;

    }

    .article{
        color : blue;
    }

    /* this is called group selector */
    h2 , h3 , h4 , h5, h6 , .article, #top_heading {
        color:blueviolet;
       
    }

</style>
<body>

    <!-- how to define id and class -->
    <h1 id="top_heading">This is my Heading First</h1>

    <p class="article">Lorem ipsum dolor sit amet, consectetur adipisicing elit.
     Cumque facere quo error dolores exercitationem consectetur rerum neque, sint repellat fuga.</p>

    <h2>This is my Heading two</h2>
    <h3>This is my Heading three</h3>
    <h4>This is my Heading four</h4>
    <h5>This is my Heading fifth</h5>
    <h6>This is my Heading six</h6>
    
</body>
</html>
