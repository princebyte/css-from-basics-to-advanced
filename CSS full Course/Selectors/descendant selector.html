<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>how to apply descendant selector in the css</title>



    <style>



        /* here i applied descendnt selector */

        #first p { 

            color: seagreen;

        }

    </style>

</head>

<body>

   <div id="first">

      <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Ratione, debitis.</p>

</div>



    <p>Lorem ipsum dolor sit amet.</p>

    

</body>

</html>
