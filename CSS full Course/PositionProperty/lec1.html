<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div{
            height : 100px;
            width : 100px;
            background-color : red; 
            border : 2px solid black;
        }
        #first{
            position : static;
            
        }

        #second{
            position : relative;
            top : 20px;
            left : 90px;
                
        }

        #third{
            position : absolute;
            top : 200px;
            left : 200px;
            
        }

        #fourth{
            position : fixed;
            top : 20px;
            left : 90px;
        
            
            
        }
    </style>
</head>
<body>
    
    <div id="first" class="div">1 static</div>
    <div id="second" class="div">2 relative</div>
    <div id="third" class="div">3 absolute</div>
    <div id="fourth" class="div">4 fixed</div>
</body>
</html>
