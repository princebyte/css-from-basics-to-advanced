<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>how to use z-index in CSS</title>
    <style>
        .container{
            position : relative ;
        }
        
        .first , .second{
           
           height : 100px;
           width : 100px;
           border : 2px solid black;
           text-align : center;

        }

        .first{
            background-color : red;
            position : absolute;
            top : 60px;
            left : 20px;
            z-index : 2;
        }

        .second{
            background-color : green;
            position : absolute;
            top : 20px;
            left : 60px;
            z-index : 3; 
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="first">first div</div>
    <div class="second">second div</div>
    </div>
</body>
</html>
