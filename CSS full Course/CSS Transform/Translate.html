<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform : Translate</title>

    <style>
        *{
            padding : 0;
            margin : 0;
        }

        .box{
            height : 100px;
            width : 100px;
            background-color : red;
            border : 2px solid black;
            margin : 5px;
            transition : all, 1s, ease-in-out, 1s;
            margin : 60px 0px 0px 0px;

        }
        #translate1:hover{transform : translate(10px, 10px); }
        #translate2:hover{transform : translate(50px,50px);}
        #translatex:hover{transform : translatex(70px);}
        #translatey:hover{transform : translatey(80px);}
    </style>
</head>
<body>
    <div id="translate1" class="box">translate1</div>
    <div id="translate2" class="box">translate2</div>
    <div id="translatex" class="box">translatex</div>
    <div id="translatey" class="box">translatey</div>
</body>
</html>
