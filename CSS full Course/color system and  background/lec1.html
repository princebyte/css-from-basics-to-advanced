<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Color</title>

    <style>
       *{
            margin : 0;
            padding : 0;
        }

        #first {
            color: blue;
            background-color: rgb(0160, 9, 9);
        }

        #second {
            color: yellow;
            background-color: seagreen;
        }

        #third {
            color: black;
            background-color: silver;
        }

        button {
            color: greenyellow;
            background-color: rebeccapurple;
        }
    </style>
</head>

<body>
    <div id="first">This is my first heading</div>
    <div id="second">This is my second heading</div>
    <div id="third">This is my third heading</div>
    <button>Click Me</button>
</body>
</html>
