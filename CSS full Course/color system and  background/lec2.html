<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>how to use apha channel colour in CSS</title>
    

    <style>
        #first{
            /* how to set transparency in css color system using alpha channel(rgba) color formate */
            color : rgba(2,5,8,5);
            background-color : blue;
        }

        #second{
            /* here i applied alpha channelk color formate */
            color : rgba(6,5,8,2);
            background-color : yellow;
        }
    </style>
</head>
<body>

    <div id="first">This is my first heading</div>
    <div id="second">this is my second heading</div>

    
</body>
</html>
