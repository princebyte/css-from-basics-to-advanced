<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        *{
            padding : 0;
            margin : 0;
        }
        .container{
            height : 700px;
            width : 700px;
            border : 2px solid black;
            margin: 5px;
            display : flex;
            flex-wrap : wrap;
            background-color :beige;


            /* ye main axis par chijo ko center karega 
            aur mai main  
             axis ke along koi bhi property laga skta jaise end,start,center et*/
            justify-content : center;

            /* ye cross axis par chijo ko center karega 
            aur mai cross axis ke along koi bhi property laga skta jaise end,start,center etc*/
            align-items : center;


            /* align-content cross axis par jo block ke bich me space hota hai use hata deta hai  */
            align-content : center;


            /* start kar denge to start se chhapna start ho jayega aur jitna bhi cross axis par in block ke bich space hai use hata dega  */
            align-content : start;

            

        }
        .heading{
            font-size : 35px;
            text-align : center;
            color : black;
        }

        .box{
            height : 100px;
            width : 100px;
            border : 2px solid red;
            margin : 5px;
            
        }
        
        

        #box1{background-color : red;}
        #box2{background-color : yellow;}
        #box3{background-color : blue;}
        #box4{background-color : green;}
        #box5{background-color :black;}
        #box6{background-color :blueviolet;}
        #box7{background-color :darkmagenta;}
        #box8{background-color :darkkhaki;}
        
    </style>
</head>
<body>
    <h1 class="heading">Flex Container</h1>
    <div class="container">
        <div id="box1" class="box">block1</div>
        <div id="box2" class="box">block2</div>
        <div id="box3" class="box">block3</div>
        <div id="box4" class="box">block4</div>
        <div id="box5" class="box">block5</div>
        <div id="box6" class="box">block6</div>
        <div id="box7" class="box">block7</div>
        <div id="box8" class="box">block8</div>
        
    </div>
</body>
</html>
