<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex items : align self</title>

    <style>
        *{
            padding : 0;
            margin : 0;
        }

        .container{
            height : 300px;
            width : 500px;
            border : 2px solid black; 
            margin: 5px;
            display : grid;
            grid-template-columns : 50px 50px;
            grid-template-rows : 50px 50px;
        }

        .box{
            height : 75px;
            width : 75px;
            margin : 5px;
            border : 2px solid black;}
        
        #box1{
            grid-row : 1 / 2;
            grid-column : 1 / 2;
        }

        #box2{
            grid-row : 1/ 2;
            grid-column : 2 / 2;
        }

        #box3{
            grid-row : 2/ 2;
            grid-column : 1/ 2;
        }

        #box4{
            grid-row : 2/ 2;
            grid-column : 2 / 2;
        }

        #box1{background-color : red;}
        #box2{background-color : blue;}
        #box3{background-color : yellow;}
        #box4{background-color : aqua;}

        </style>
</head>
<body>
    
    <div class="container">

        <div id="box1" class="box">block1</div>
        <div id="box2" class="box">block2</div>
        <div id="box3" class="box">block3</div>
        <div id="box4" class="box">block4</div>
        

    </div>
</body>
</html>

</body>
</html>
