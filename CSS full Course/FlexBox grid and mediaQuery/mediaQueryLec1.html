<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mediaQuery:width</title>
    <style>

        
        .box{
            padding : 5px;
            height : 100px;
            width : 100px;
            background-color : green;
           
            
           
            }
        
        @media screen and (max-width : 300px){
            .box{
                height : 150px;
                width : 150px;
            }
        }
    </style>
</head>
<body>
    <div class="box">MainBOx</div>
</body>
</html>
