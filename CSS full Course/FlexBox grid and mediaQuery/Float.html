<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>how to use flex box in CSS</title>
    <style>
        .container{
            height : 110px;
            width : 300px;
            border : 2px solid black;
            background-color : purple;
        }

        .box{
            margin : 5px;
            border : 2px dashed black;
            text-align : center;
        }
       
        .first{
            height : 100px;
            width : 100px;
            background-color : green;
            float : left;
        }

        .second{
            height : 100px;
            width : 100px;
            background-color : red;
            float : right;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="first box">Box1</div>
        <div class="second box">Box2</div>

    </div>
</body>
</html>
