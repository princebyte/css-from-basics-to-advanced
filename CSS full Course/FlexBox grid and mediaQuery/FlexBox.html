<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        *{
            padding : 0;
            margin : 0;
        }
        .container{
            height : 700px;
            width : 700px;
            border : 2px solid black;
            margin: 5px;
            display : flex;
            background-color :beige;
            /* flex-direction : column-reverse; */
            flex-direction : row-reverse;

        }
        .heading{
            font-size : 35px;
            text-align : center;
            color : black;
        }

        .box{
            height : 200px;
            width : 200px;
            border : 2px solid red;
            margin : 5px;
            
        }
        
        

        #box1{background-color : red;}
        #box2{background-color : yellow;}
        #box3{background-color : blue;}
        #box4{background-color : green;}
    </style>
</head>
<body>
    <h1 class="heading">Flex Container</h1>
    <div class="container">
        <div id="box1" class="box">block1</div>
        <div id="box2" class="box">block2</div>
        <div id="box3" class="box">block3</div>
        <div id="box4" class="box">block4</div>
    </div>
</body>
</html>
