<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex shrink</title>
</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex items : align self</title>

    <style>
        *{
            padding : 0;
            margin : 0;
        }

        .container{
            height : 300px;
            width : 400px;
            border : 2px solid black;
            margin : 5px;
            display : flex;   
        }

        .box{
            height : 80px;
            width : 80px;
            margin : 5px;
            border : 2px solid black;
        }

        #box1{background-color : red;}
        #box2{background-color : blue;}
        #box3{background-color : yellow;}
        #box4{
            background-color : aqua;
            /* yaha flex shrink karne par box4 chota ho jayega  */
            flex-shrink : 4;
            
        }
        #box5{background-color : blueviolet;}
    </style>
</head>
<body>
    
    <div class="container">

        <div id="box1" class="box">block1</div>
        <div id="box2" class="box">block2</div>
        <div id="box3" class="box">block3</div>
        <div id="box4" class="box">block4</div>
        <div id="box5" class="box">block5</div>

    </div>
</body>
</html>

</body>
</html>
