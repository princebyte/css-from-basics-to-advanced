<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order</title>

    <style>
        *{
            padding : 0;
            margin : 0;
        }

        .container{
            height : 300px;
            width : 600px;
            border : 2px solid black;
            margin : 5px;
            display : flex;   
            justify-content : center;
        }

        .box{
            height : 75px;
            width : 75px;
            margin : 5px;
            border : 2px solid black;
           
        }

        #box1{
            background-color : red;
            order : 2;
        }
        #box2{
            background-color : blue;
            /* yha jaise hi maine box2 ko order 3 diya wo number 3 par chala gaya */
            order : 3;
        }
        #box3{
            background-color : yellow;
            order : 4;
        }
        #box4{
            background-color : aqua;
            order : 1;
        }

            
            
       
    </style>
</head>
<body>
    
    <div class="container">

        <div id="box1" class="box">block1</div>
        <div id="box2" class="box">block2</div>
        <div id="box3" class="box">block3</div>
        <div id="box4" class="box">block4</div>
        

    </div>
</body>
</html>

</body>
</html>
